name: Pi Supermemory CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .pi/extensions/supermemory/package-lock.json

      - name: Install dependencies (Extension)
        run: |
          cd .pi/extensions/supermemory
          npm install

      - name: Run Unit & Integration Tests
        run: |
          cd .pi/extensions/supermemory
          npm test

  e2e:
    name: Live E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: unit-integration
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Root)
        run: npm install

      - name: Run E2E Tests
        if: env.SUPERMEMORY_API_KEY != ''
        env:
          SUPERMEMORY_API_KEY: ${{ secrets.SUPERMEMORY_API_KEY }}
          SUPERMEMORY_CONTAINER_TAG: pi-ci-test
        run: npm run test:e2e
